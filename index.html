<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-image: url("https://media.istockphoto.com/id/1496508204/vector/abstract-vector-heat-map-of-hot-and-cold-distribution-background.jpg?s=612x612&w=0&k=20&c=d3u0hzoTOBuK9qxhyaNtQyX7nrNa92aAm_4WGxOOzVA=");
            background-size: cover;
            background-repeat: repeat;
            background-position: center;
            background-attachment: fixed;
            background-color: yellow;
            display: flex;
            align-items: center;
            min-height: 100vh;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }
    </style>
</head>
<body>
<div class="container mt-4 shadow p-3" style="max-width: 600px; width: 100%; height: auto; background-color: white;border-radius: 20px;">
<div class="row align-items-center">
<div class="col-8">    
    <h1>Heat Index Checker</h1>
    <details class="ontoggle my-2">
        <summary class="">Note:</summary>
        <p id="instruct" class='text-dark'></p>
    </details>

    <label for="degree">Degree in °C</label>
    <br>
    <input type="number" name="degree" id="temp" class="text-center form-control my-2" placeholder="Input degree value">

    <label for="humidity">Humidity in %</label>
    <br>
    <input type="number" name="humidity" id="humid" class="text-center form-control my-2" placeholder="Input percentage value">

    <button class="btn btn-warning" onclick="checkHeatIndex()">Check</button>
</div>

<div class="col-4 text-center" style="display: flex;
  align-items: center;">
    <img src="https://img.freepik.com/premium-vector/hot-sunny-day-weather-icon_854353-866.jpg?semt=ais_hybrid&w=740&q=80" alt="" style="width: 150px; height: auto;">
</div>
</div>
</div>

<script>
    document.getElementById("instruct").innerHTML = "<i>Input the temperature (°C) and humidity (%, then click Check to see the heat index and its status.";

    function checkHeatIndex(){
var temperature = Number(document.getElementById("temp").value);
        var humidity = Number(document.getElementById("humid").value);

        var HeatIndex = temperature + (0.33 * humidity) - 4;

        // Use HeatIndex in your conditions
        if (HeatIndex < 28){
            alert("Heat Index: " + HeatIndex.toFixed(2) + "\nStatus: Comfortable / Cool");
        }
        else if (HeatIndex < 33){
            alert("Heat Index: " + HeatIndex.toFixed(2) + "\nStatus: Warm");
        }
        else if (HeatIndex < 42){
            alert("Heat Index: " + HeatIndex.toFixed(2) + "\nStatus: Hot");
        }
        else if (HeatIndex < 52){
            alert("Heat Index: " + HeatIndex.toFixed(2) + "\nStatus: Very Hot / Caution");
        }
        else {
            alert("Heat Index: " + HeatIndex.toFixed(2) + "\nStatus: Extreme Heat / Danger");
        }
    }

</script>
</body>
</html>
